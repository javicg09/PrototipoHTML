<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reserva | Taxis Tenerife</title>
    <link rel="icon" type="image/png" href="../img/icono.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <header class="bg-dark py-3 mb-4 shadow-sm">
        <div class="container d-flex align-items-center">
            <a href="./index.html" class="btn btn-outline-light btn-sm me-3">← Volver</a>
            <h1 class="text-white h4 mb-0">Reserva tu Taxi</h1>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            
            <div class="col-md-8 col-lg-6">
                
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="h4 mb-4 text-center fw-bold">Detalles del traslado</h2>
                        
                        <form>
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre completo</label>
                                <input type="text" class="form-control" id="nombre" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="tu@email.com" required>
                            </div>

                            <div class="mb-4">
                                <label for="mensaje" class="form-label">¿Desde y hacia dónde viajas?</label>
                                <textarea class="form-control" id="mensaje" rows="4" placeholder="Ej: Aeropuerto Sur a Costa Adeje..." required></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">Confirmar Reserva</button>
                            </div>
                        </form>
                        
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
