name: Deploy src/ to GitHub Pages

on:
  push:
    branches:
      - main  # Cambia a 'master' si tu rama principal se llama así
  workflow_dispatch:  # Permite ejecutarlo manualmente desde Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload src/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src  # Publica solo el contenido de src/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4