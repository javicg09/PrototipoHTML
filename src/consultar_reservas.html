<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Consulta de Reservas - Taxi Tenerife</title>
    <link rel="icon" type="image/png" href="../img/icono.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

    <header class="bg-white shadow-sm mb-4">
        <div class="container py-3 d-flex align-items-center">
            <img src="../img/icono.png" alt="Logo Empresa" width="120" height="70" class="me-2 rounded shadow-sm">
            <h1 class="h3 mb-0 text-dark fw-bold">Taxis Tenerife</h1>
        </div>

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">Inicio</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navMenu">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="./precios.html">Precios</a></li>
                        <li class="nav-item"><a class="nav-link" href="./formulario.html">Contacto</a></li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown">Reservas</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="./gestion_de_reservas.html">Nueva Reserva</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="./consultar_reservas.html">Gestionar existente</a></li>
                            </ul>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="¿A dónde vas?">
                        <button class="btn btn-secondary" type="submit">Buscar</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold">
                        <i class="bi bi-search me-2"></i>Consultar reserva existente
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Código de reserva</label>
                                <input type="text" name="codigo" class="form-control" placeholder="Introduce tu código" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Correo electrónico</label>
                                <input type="email" name="email" class="form-control" placeholder="Introduce tu email" required>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-dark"><i class="bi bi-search me-2"></i>Consultar reserva</button>
                                <a href="index.html" class="btn btn-secondary"><i class="bi bi-arrow-left me-2"></i>Volver a inicio</a>
                            </div>
                        </form>
                        <div id="resultado"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white pt-5 pb-3 mt-auto">
        <div class="container text-center text-md-start">
            <div class="row">
                <div class="col-md-6 mb-4">
                    <h5 class="text-uppercase fw-bold">Taxi Tenerife</h5>
                    <p class="small text-secondary">Tu transporte de confianza en la isla desde 2026.</p>
                </div>
                <div class="col-md-6 text-md-end mb-4">
                    <p class="mb-0">&copy; 2026 Taxi Tenerife Service. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/reservas.js"></script>
    <script src="./js/consultar.js"></script>
</body>
</html>
